<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right,#eef2f3,#d9e4f5);
}

header{
    background: linear-gradient(135deg,#004e92,#000428);
    color:white;
    padding:25px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:32px;
}

.controls{
    margin-top:15px;
}

select,input,button{
    padding:8px;
    border-radius:6px;
    border:none;
    margin:5px;
}

button{
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.categories{
    text-align:center;
    padding:15px;
}

.categories button{
    background:#004e92;
    color:white;
}

.categories button:hover{

}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
    transition:0.3s;
    position:relative;
}

.card:hover{
    transform:translateY(-5px);
}

.tag{
    position:absolute;
    top:15px;
    right:15px;
    background:#007bff;
    color:white;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}

.card h3{
    margin-top:0;
    color:#004e92;
}

.card p{

}

.apply-btn{
    background:#28a745;
    color:white;
    margin-top:10px;
}

.listen-btn{
    background:#6f42c1;
    color:white;
}
</style>
</head>

let currentLang="en";
function displaySchemes(list){
    const container = document.getElementById("schemeContainer");
    container.innerHTML = "";

    if(list.length === 0){
        container.innerHTML = "<p>No schemes found</p>";
        return;
    }

    list.forEach(s => {
        const d = s.data[currentLang];

        container.innerHTML += `
        <div class="card">
            <span class="tag">${s.category}</span>
            <h3>${d.name}</h3>
            <p><strong>Description:</strong> ${d.desc}</p>
            <p><strong>Eligibility:</strong> ${d.eligibility}</p>
            <p><strong>How to Apply:</strong> ${d.apply}</p>

            <button class="listen-btn" onclick="speakText('${d.name}. ${d.desc}')">
                🔊 Listen
            </button>

            ${
                s.link && s.link !== "#"
                ? `<button class="apply-btn" onclick="window.open('${s.link}','_blank')">
                        Apply Now
                   </button>`
                : `<button class="apply-btn" onclick="alert('Official website not available')">
                        Apply Now
                   </button>`
            }
        </div>
        `;
    });
}
const API_KEY = "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";

async function aiSearch(userQuery){
    const schemeNames = schemes.map(s => ({
        category: s.category,
        name: s.data[currentLang].name,
        desc: s.data[currentLang].desc
    }));

    const prompt = `
User query: "${userQuery}"

From this list of schemes:
${JSON.stringify(schemeNames)}

Return only the category names that match the user's intent.
Example:
Query: farmer support
Output: farmer
Query: health insurance
Output: health
`;

    const response = await fetch("https://openrouter.ai/api/v1/chat/completions",{
        method:"POST",
        headers:{
            "Authorization":"Bearer " + API_KEY,
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            model:"openai/gpt-3.5-turbo",
            messages:[{role:"user", content:prompt}]
        })
    });

    const data = await response.json();
    let category = data.choices[0].message.content.toLowerCase();

// Extract correct category from AI response
if(category.includes("farmer")) category = "farmer";
else if(category.includes("health")) category = "health";
else if(category.includes("housing")) category = "housing";
else if(category.includes("student")) category = "student";
else category = "all";

if(category === "all"){
    displaySchemes(schemes);
} else {
    const filtered = schemes.filter(s => s.category === category);
    displaySchemes(filtered);
}
}

document.getElementById("searchInput").addEventListener("change",function(){
    aiSearch(this.value);
});

function filterCategory(cat){
if(cat==="all"){displaySchemes(schemes);return;}
displaySchemes(schemes.filter(s=>s.category===cat));
}


function changeLanguage(){
currentLang=document.getElementById("languageSelect").value;
displaySchemes(schemes);
}

function startVoice(){
    const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
    recognition.lang=currentLang==="ta"?"ta-IN":currentLang==="hi"?"hi-IN":"en-IN";

    recognition.onresult=function(e){
        const text = e.results[0][0].transcript;
        document.getElementById("searchInput").value = text;
        aiSearch(text);   
    };

    recognition.start();
}


function speakText(text){
const speech=new SpeechSynthesisUtterance(text);
speech.lang=currentLang==="ta"?"ta-IN":currentLang==="hi"?"hi-IN":"en-IN";
speechSynthesis.speak(speech);
}


// INIT
displaySchemes(schemes);
